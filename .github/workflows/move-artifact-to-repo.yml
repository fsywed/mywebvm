name: Move Artifact to Repository
on: workflow_dispatch
jobs:
  move-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webvm-image
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 5706696920
      - name: Setup git config
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
      - name: Commit and push artifact
        run: |
          mkdir -p ext2
          cp *.ext2 ext2/ 2>/dev/null || echo "No ext2 file found"
          if [ -f ext2/*.ext2 ]; then
            git add ext2/*.ext2
            git commit -m "Add WebVM image from artifact #5706696920"
            git push
          else
            echo "No ext2 file to commit"
            exit 1
          fi
