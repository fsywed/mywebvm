name: Move Artifact to Repository
on: workflow_dispatch
jobs:
  move-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download artifact using gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用新的 run-id
          gh run download 5707861278 --name github-pages --dir ./downloaded-artifact
          
          echo "=== Downloaded files ==="
          ls -la ./downloaded-artifact/
          
          # 创建 ext2 目录
          mkdir -p ext2
          
          # 查找并复制 .ext2 文件
          find ./downloaded-artifact -name "*.ext2" -exec cp {} ext2/ \;
          
          # 检查结果
          if [ -n "$(ls -A ext2/*.ext2 2>/dev/null)" ]; then
            echo "✅ Found ext2 files:"
            ls -la ext2/
          else
            echo "❌ No .ext2 files found"
            echo "Artifact contents:"
            find ./downloaded-artifact -type f | head -20
            exit 1
          fi
      
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add ext2/*.ext2
          git commit -m "Add WebVM image from build #7 (265MB)"
          git push
