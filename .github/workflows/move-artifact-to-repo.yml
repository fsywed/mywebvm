name: Move Artifact to Repository
on: workflow_dispatch
jobs:
  move-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download artifact using gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download 22544917989 --name github-pages --dir ./downloaded-artifact
          
          echo "=== Downloaded files ==="
          ls -la ./downloaded-artifact/
      
      - name: Extract and merge artifact
        run: |
          mkdir -p extracted
          
          # 解压 tar
          if [ -f ./downloaded-artifact/artifact.tar ]; then
            echo "Extracting artifact.tar..."
            tar -xvf ./downloaded-artifact/artifact.tar -C ./extracted/
          fi
          
          echo "=== Extracted files ==="
          ls -la ./extracted/
          
          # 创建 ext2 目录
          mkdir -p ext2
          
          # 查找所有分片文件
          cd ./extracted
          
          # 获取基础文件名（去掉最后一个 .cxxxxxx.txt 部分）
          for file in *.ext2.c*.txt; do
            if [ -f "$file" ]; then
              base_name=$(echo "$file" | sed 's/\.c[0-9a-f]*\.txt$//')
              echo "Base name: $base_name"
              
              # 合并所有分片
              cat "$base_name".c*.txt > "../$base_name.ext2"
              echo "✅ Merged: $base_name.ext2"
            fi
            break  # 只处理一次，找到基础名
          done
          
          cd ..
          
          # 移动合并后的文件到 ext2 目录
          if [ -f *.ext2 ]; then
            mv *.ext2 ext2/
          fi
          
          # 检查结果
          if [ -n "$(ls -A ext2/*.ext2 2>/dev/null)" ]; then
            echo "✅ Successfully created ext2 files:"
            ls -la ext2/
          else
            echo "❌ Failed to create ext2 files"
            exit 1
          fi
      
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add ext2/*.ext2
          git commit -m "Add merged WebVM image from build #7"
          git push
