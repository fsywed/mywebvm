name: Move Artifact to Repository
on: workflow_dispatch
jobs:
  move-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true  # 启用 LFS
      
      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "*.ext2"
          git add .gitattributes
      
      - name: Download artifact using gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download 22544917989 --name github-pages --dir ./downloaded-artifact
          
          echo "=== Downloaded files ==="
          ls -la ./downloaded-artifact/
      
      - name: Extract and merge artifact
        run: |
          mkdir -p extracted
          
          # 解压 tar
          if [ -f ./downloaded-artifact/artifact.tar ]; then
            echo "Extracting artifact.tar..."
            tar -xvf ./downloaded-artifact/artifact.tar -C ./extracted/
          fi
          
          echo "=== Extracted files ==="
          ls -la ./extracted/
          
          # 创建 ext2 目录
          mkdir -p ext2
          
          # 进入 extracted 目录处理分片
          cd ./extracted
          
          # 获取基础文件名
          for file in *.ext2.c*.txt; do
            if [ -f "$file" ]; then
              base_name=$(echo "$file" | sed 's/\.c[0-9a-f]*\.txt$//')
              echo "Base name: $base_name"
              
              # 合并所有分片
              cat "$base_name".c*.txt > "$base_name.ext2"
              echo "✅ Merged: $base_name.ext2"
              
              # 移动到 ext2 目录
              mv "$base_name.ext2" ../ext2/
              break
            fi
          done
          
          cd ..
          
          # 检查结果
          if [ -n "$(ls -A ext2/*.ext2 2>/dev/null)" ]; then
            echo "✅ Successfully created ext2 files:"
            ls -la ext2/
            
            # 显示文件大小
            echo "File size:"
            du -h ext2/*.ext2
          else
            echo "❌ Failed to create ext2 files"
            exit 1
          fi
      
      - name: Commit and push with LFS
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # 确保 LFS 跟踪 .ext2 文件
          git lfs track "*.ext2"
          git add .gitattributes
          
          # 添加大文件到 LFS
          git add ext2/*.ext2
          git commit -m "Add merged WebVM image from build #7 (using LFS)"
          
          # 推送
          git push
